name: Linux Release Build

on:
  push:
    branches:
      - issue-26-appimage-workflow
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build (branch, tag, or commit SHA)
        required: false
        default: main
      publish_release:
        description: Override and publish GitHub release for this run
        required: false
        default: "false"
      release_channel:
        description: Publish channel (stable or prerelease)
        required: false
        default: stable
      release_tag:
        description: Tag name to publish (e.g. v0.10.5). Leave empty to skip release publishing.
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-linux:
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-22.04
    env:
      TEMURIN_LINUX_X64_TAR_GZ_URL: ${{ vars.TEMURIN_LINUX_X64_TAR_GZ_URL }}
      TEMURIN_LINUX_X64_SHA256: ${{ vars.TEMURIN_LINUX_X64_SHA256 }}
      JDTLS_DIST_URL: ${{ vars.JDTLS_DIST_URL }}
      JDTLS_DIST_SHA256: ${{ vars.JDTLS_DIST_SHA256 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java (for bridge builds)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: current

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Restore resource archive cache
        uses: actions/cache@v4
        with:
          path: |
            .cache/temurin
            .cache/jdtls
          key: linux-resources-x64-${{ env.TEMURIN_LINUX_X64_SHA256 }}-${{ env.JDTLS_DIST_SHA256 }}

      - name: Validate required variables
        run: |
          set -euo pipefail
          required=(
            "TEMURIN_LINUX_X64_TAR_GZ_URL"
            "TEMURIN_LINUX_X64_SHA256"
            "JDTLS_DIST_URL"
            "JDTLS_DIST_SHA256"
          )
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required Actions variable: $name" >&2
              exit 1
            fi
          done

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libfuse2

      - name: Install npm dependencies
        run: npm ci

      - name: Build Java parser bridge
        run: |
          pushd java-parser
          gradle copyBridgeJar --no-daemon --rerun-tasks
          popd

      - name: Build JShell bridge
        run: |
          pushd jshell-bridge
          gradle copyBridgeJar --no-daemon --rerun-tasks
          popd

      - name: Stop Gradle daemons
        run: gradle --stop || true

      - name: Prepare bundled JDK and JDTLS resources
        run: |
          set -euo pipefail
          echo "[resources] Preparing bundled JDK and JDTLS resources..."

          mkdir -p .cache/temurin .cache/jdtls

          temurin_archive=".cache/temurin/temurin-linux-x64.tar.gz"
          if [[ ! -f "$temurin_archive" ]]; then
            echo "[resources] Temurin archive cache miss; downloading from URL."
            curl -fL "$TEMURIN_LINUX_X64_TAR_GZ_URL" -o "$temurin_archive"
          else
            echo "[resources] Temurin archive cache hit: $temurin_archive"
          fi
          temurin_hash="$(sha256sum "$temurin_archive" | awk '{print tolower($1)}')"
          temurin_sha_lc="$(printf '%s' "$TEMURIN_LINUX_X64_SHA256" | tr '[:upper:]' '[:lower:]')"
          if [[ "$temurin_hash" != "$temurin_sha_lc" ]]; then
            echo "Temurin SHA256 mismatch: expected $TEMURIN_LINUX_X64_SHA256, got $temurin_hash" >&2
            exit 1
          fi
          echo "[resources] Temurin SHA256 verified."

          jdtls_archive=".cache/jdtls/jdtls.tar.gz"
          if [[ ! -f "$jdtls_archive" ]]; then
            echo "[resources] JDTLS archive cache miss; downloading from URL."
            curl -fL "$JDTLS_DIST_URL" -o "$jdtls_archive"
          else
            echo "[resources] JDTLS archive cache hit: $jdtls_archive"
          fi
          jdtls_hash="$(sha256sum "$jdtls_archive" | awk '{print tolower($1)}')"
          jdtls_sha_lc="$(printf '%s' "$JDTLS_DIST_SHA256" | tr '[:upper:]' '[:lower:]')"
          if [[ "$jdtls_hash" != "$jdtls_sha_lc" ]]; then
            echo "JDTLS SHA256 mismatch: expected $JDTLS_DIST_SHA256, got $jdtls_hash" >&2
            exit 1
          fi
          echo "[resources] JDTLS SHA256 verified."

          jdk_target="resources/jdk/linux-x64"
          echo "[resources] Extracting JDK into $jdk_target"
          rm -rf "$jdk_target"
          mkdir -p "$jdk_target"
          jdk_extract=".cache/temurin/extracted-x64"
          rm -rf "$jdk_extract"
          mkdir -p "$jdk_extract"
          tar -xzf "$temurin_archive" -C "$jdk_extract"
          jdk_root="$(find "$jdk_extract" -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          if [[ -z "$jdk_root" ]]; then
            echo "Could not find extracted JDK directory" >&2
            exit 1
          fi
          cp -a "$jdk_root"/. "$jdk_target"/
          if [[ ! -x "$jdk_target/bin/java" || ! -x "$jdk_target/bin/javac" ]]; then
            echo "Extracted Linux JDK is missing bin/java or bin/javac in $jdk_target" >&2
            exit 1
          fi
          echo "[resources] JDK extracted successfully."

          jdtls_target="resources/jdtls"
          echo "[resources] Extracting JDTLS into $jdtls_target"
          rm -rf "$jdtls_target"
          mkdir -p "$jdtls_target"
          tar -xzf "$jdtls_archive" -C "$jdtls_target"
          echo "[resources] JDTLS extracted successfully."

          for required_dir in plugins features config_linux; do
            if [[ ! -d "$jdtls_target/$required_dir" ]]; then
              echo "JDTLS archive missing expected directory: $required_dir" >&2
              exit 1
            fi
            echo "[resources] Verified JDTLS directory: $required_dir"
          done
          echo "[resources] Resource preparation complete."

      - name: Clean cached bundle intermediates
        run: rm -rf "src-tauri/target/release/bundle"

      - name: Build Tauri AppImage bundle
        id: tauri_appimage_build
        continue-on-error: true
        env:
          RUST_LOG: tauri_bundler=trace
          RUST_BACKTRACE: "1"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPIMAGE_EXTRACT_AND_RUN: "1"
          ARCH: x86_64
          NO_STRIP: "true"
        run: npx tauri build --ci --bundles appimage --config src-tauri/tauri.linux-release.conf.json

      - name: Diagnose AppImage linuxdeploy failure
        if: ${{ steps.tauri_appimage_build.outcome == 'failure' }}
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          ARCH: x86_64
          NO_STRIP: "true"
        run: |
          set -uo pipefail

          diagnostics_dir="linux-appimage-diagnostics"
          mkdir -p "$diagnostics_dir"

          {
            echo "## AppImage diagnostic context"
            echo "date: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo "pwd: $PWD"
            echo "uname: $(uname -a)"
            echo "ARCH: ${ARCH:-}"
            echo "APPIMAGE_EXTRACT_AND_RUN: ${APPIMAGE_EXTRACT_AND_RUN:-}"
            echo "NO_STRIP: ${NO_STRIP:-}"
            echo
            echo "## Tool versions"
            command -v npx || true
            command -v cargo || true
            command -v patchelf || true
            command -v strip || true
            npx tauri --version || true
            patchelf --version || true
            strip --version | head -n 1 || true
          } 2>&1 | tee "$diagnostics_dir/context.txt"

          {
            echo "## AppImage bundle directory"
            find "src-tauri/target/release/bundle/appimage" -maxdepth 4 -printf "%M %10s %p\n" 2>&1 | sort || true
            echo
            echo "## Tauri cache"
            find "$HOME/.cache/tauri" -maxdepth 3 -printf "%M %10s %p\n" 2>&1 | sort || true
          } > "$diagnostics_dir/files.txt"

          appdir="$(find "src-tauri/target/release/bundle/appimage" -maxdepth 1 -type d -name "*.AppDir" | head -n 1 || true)"
          linuxdeploy="$(find "$HOME/.cache/tauri" "src-tauri/target" -type f -name "linuxdeploy-x86_64.AppImage" 2>/dev/null | head -n 1 || true)"

          {
            echo "appdir=$appdir"
            echo "linuxdeploy=$linuxdeploy"
          } | tee "$diagnostics_dir/selected-paths.txt"

          if [[ -n "$appdir" ]]; then
            find "$appdir" -maxdepth 5 -printf "%M %10s %p\n" 2>&1 | sort > "$diagnostics_dir/appdir-tree.txt" || true
            find "$appdir" -type f -exec file {} \; 2>&1 > "$diagnostics_dir/appdir-file-types.txt" || true
            find "$appdir" -type f -perm /111 -exec sh -c 'for p do echo "### $p"; ldd "$p" || true; done' sh {} + \
              > "$diagnostics_dir/appdir-executable-ldd.txt" 2>&1 || true
          fi

          if [[ -z "$appdir" || -z "$linuxdeploy" ]]; then
            echo "Missing AppDir or linuxdeploy cache path; skipping manual linuxdeploy rerun." \
              | tee "$diagnostics_dir/linuxdeploy-rerun.log"
            exit 0
          fi

          chmod +x "$linuxdeploy" || true
          find "$(dirname "$linuxdeploy")" -maxdepth 1 -type f -name "linuxdeploy-plugin-*" -exec chmod +x {} \; 2>/dev/null || true
          export PATH="$(dirname "$linuxdeploy"):$PATH"

          appdir_abs="$(realpath "$appdir")"
          set +e
          "$linuxdeploy" --appimage-extract-and-run --verbosity 3 --appdir "$appdir_abs" --plugin gtk --output appimage \
            > "$diagnostics_dir/linuxdeploy-rerun.log" 2>&1
          linuxdeploy_status=$?
          set -e

          echo "$linuxdeploy_status" > "$diagnostics_dir/linuxdeploy-rerun-exit-code.txt"
          echo "Manual linuxdeploy rerun exited with $linuxdeploy_status"

      - name: Upload AppImage diagnostics
        if: ${{ steps.tauri_appimage_build.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage-diagnostics
          path: linux-appimage-diagnostics/
          if-no-files-found: warn

      - name: Fail after AppImage diagnostics
        if: ${{ steps.tauri_appimage_build.outcome == 'failure' }}
        run: exit 1

      - name: Prepare release assets
        run: |
          set -euo pipefail

          appimage_file="$(find "src-tauri/target/release/bundle/appimage" -type f -name '*.AppImage' ! -name '*.sig' | head -n 1)"
          if [[ -z "$appimage_file" ]]; then
            echo "AppImage bundle not found." >&2
            exit 1
          fi
          appimage_sig="$appimage_file.sig"
          if [[ ! -f "$appimage_sig" ]]; then
            echo "Updater signature not found for $appimage_file" >&2
            exit 1
          fi

          version="$(awk -F '"' '/^[[:space:]]*version[[:space:]]*=/{print $2; exit}' src-tauri/Cargo.toml | tr -d '\r')"
          if [[ -z "$version" ]]; then
            echo "Could not resolve app version from src-tauri/Cargo.toml" >&2
            exit 1
          fi
          release_asset_dir="release-assets"
          mkdir -p "$release_asset_dir"

          appimage_release_name="UnimozerNext_${version}_x86_64.AppImage"
          cp "$appimage_file" "$release_asset_dir/$appimage_release_name"
          cp "$appimage_sig" "$release_asset_dir/$appimage_release_name.sig"

      - name: Resolve release metadata
        id: release_meta
        run: |
          set -euo pipefail
          event_name="${{ github.event_name }}"
          publish_input="${{ github.event.inputs.publish_release }}"
          channel="${{ github.event.inputs.release_channel }}"
          release_tag="${{ github.event.inputs.release_tag }}"
          publish_release="false"
          tag_name=""
          is_prerelease="false"

          if [[ "$event_name" == "push" ]]; then
            if [[ "${{ github.ref }}" == refs/tags/* && "${{ vars.PUBLISH_GH_RELEASE }}" == "true" ]]; then
              publish_release="true"
              tag_name="${{ github.ref_name }}"
            elif [[ "${{ github.ref }}" == "refs/heads/prerelease" ]]; then
              publish_release="true"
              tag_name="updater-prerelease"
              is_prerelease="true"
            fi
          elif [[ "$event_name" == "workflow_dispatch" && "$publish_input" == "true" ]]; then
            if [[ "$channel" == "prerelease" ]]; then
              publish_release="true"
              tag_name="updater-prerelease"
              is_prerelease="true"
            elif [[ -n "$release_tag" ]]; then
              publish_release="true"
              tag_name="$release_tag"
            fi
          fi

          echo "publish_release=$publish_release" >> "$GITHUB_OUTPUT"
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"

      - name: Generate updater manifest
        if: ${{ steps.release_meta.outputs.publish_release == 'true' }}
        run: |
          set -euo pipefail

          release_tag="${{ steps.release_meta.outputs.tag_name }}"
          release_base="https://github.com/${{ github.repository }}/releases/download/$release_tag"
          updater_target="linux-x86_64"

          appimage_release_path="$(find "release-assets" -maxdepth 1 -type f -name "UnimozerNext_*_x86_64.AppImage" ! -name "*.sig" | head -n 1)"
          if [[ -z "$appimage_release_path" ]]; then
            echo "Prepared AppImage not found." >&2
            exit 1
          fi
          appimage_sig="$appimage_release_path.sig"
          if [[ ! -f "$appimage_sig" ]]; then
            echo "Prepared updater signature not found for $appimage_release_path" >&2
            exit 1
          fi
          appimage_release_name="$(basename "$appimage_release_path")"
          version="$(echo "$appimage_release_name" | sed -E 's/^UnimozerNext_(.+)_x86_64\.AppImage$/\1/')"
          if [[ -z "$version" ]]; then
            echo "Could not resolve app version from release asset filename: $appimage_release_name" >&2
            exit 1
          fi

          signature="$(tr -d '\n\r' < "$appimage_sig")"
          appimage_name_encoded="$(python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1]))' "$appimage_release_name")"

          mkdir -p updater-manifests
          cat > "updater-manifests/latest-${updater_target}.json" <<JSON
          {
            "version": "$version",
            "platforms": {
              "$updater_target": {
                "signature": "$signature",
                "url": "$release_base/$appimage_name_encoded"
              }
            }
          }
          JSON

      - name: Upload Linux bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-bundles
          path: |
            release-assets/UnimozerNext_*_x86_64.AppImage
            release-assets/UnimozerNext_*_x86_64.AppImage.sig
            updater-manifests/latest-linux-x86_64.json
          if-no-files-found: error

      - name: Publish GitHub release
        if: ${{ steps.release_meta.outputs.publish_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          prerelease: ${{ steps.release_meta.outputs.is_prerelease == 'true' }}
          make_latest: ${{ steps.release_meta.outputs.is_prerelease != 'true' }}
          files: |
            release-assets/UnimozerNext_*_x86_64.AppImage
            release-assets/UnimozerNext_*_x86_64.AppImage.sig
            updater-manifests/latest-linux-x86_64.json

      - name: Prune stale prerelease Linux assets
        if: ${{ steps.release_meta.outputs.publish_release == 'true' && steps.release_meta.outputs.tag_name == 'updater-prerelease' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("node:fs");
            const cargo = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
            const versionMatch = cargo.match(/^version\s*=\s*"([^"]+)"/m);
            if (!versionMatch) {
              core.setFailed("Could not read version from src-tauri/Cargo.toml");
              return;
            }
            const version = versionMatch[1];
            const keep = new Set([
              `UnimozerNext_${version}_x86_64.AppImage`,
              `UnimozerNext_${version}_x86_64.AppImage.sig`,
              `latest-linux-x86_64.json`
            ]);

            const stalePattern = /^UnimozerNext_.*_x86_64\.(AppImage|AppImage\.sig)$/;

            const { owner, repo } = context.repo;
            const release = await github.rest.repos.getReleaseByTag({
              owner,
              repo,
              tag: "updater-prerelease"
            });
            const assets = await github.paginate(github.rest.repos.listReleaseAssets, {
              owner,
              repo,
              release_id: release.data.id,
              per_page: 100
            });

            for (const asset of assets) {
              if (!stalePattern.test(asset.name)) continue;
              if (keep.has(asset.name)) continue;
              core.info(`Deleting stale Linux prerelease asset: ${asset.name}`);
              await github.rest.repos.deleteReleaseAsset({
                owner,
                repo,
                asset_id: asset.id
              });
            }
