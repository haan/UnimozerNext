name: Linux Debian Release Build

on:
  push:
    branches:
      - prerelease
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build (branch, tag, or commit SHA)
        required: false
        default: main
      publish_release:
        description: Override and publish GitHub release for this run
        required: false
        default: "false"
      release_channel:
        description: Publish channel (stable or prerelease)
        required: false
        default: stable
      release_tag:
        description: Tag name to publish (e.g. v0.10.5). Leave empty to skip release publishing.
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-linux-deb:
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-22.04
    env:
      TEMURIN_LINUX_X64_TAR_GZ_URL: ${{ vars.TEMURIN_LINUX_X64_TAR_GZ_URL }}
      TEMURIN_LINUX_X64_SHA256: ${{ vars.TEMURIN_LINUX_X64_SHA256 }}
      JDTLS_DIST_URL: ${{ vars.JDTLS_DIST_URL }}
      JDTLS_DIST_SHA256: ${{ vars.JDTLS_DIST_SHA256 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java (for bridge builds)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: current

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Restore resource archive cache
        uses: actions/cache@v4
        with:
          path: |
            .cache/temurin
            .cache/jdtls
          key: linux-resources-x64-${{ env.TEMURIN_LINUX_X64_SHA256 }}-${{ env.JDTLS_DIST_SHA256 }}

      - name: Validate required variables
        run: |
          set -euo pipefail
          required=(
            "TEMURIN_LINUX_X64_TAR_GZ_URL"
            "TEMURIN_LINUX_X64_SHA256"
            "JDTLS_DIST_URL"
            "JDTLS_DIST_SHA256"
          )
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required Actions variable: $name" >&2
              exit 1
            fi
          done

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libfuse2 \
            apt-utils \
            dpkg-dev \
            gnupg \
            gzip

      - name: Install npm dependencies
        run: npm ci

      - name: Build Java parser bridge
        run: |
          pushd java-parser
          gradle copyBridgeJar --no-daemon --rerun-tasks
          popd

      - name: Build JShell bridge
        run: |
          pushd jshell-bridge
          gradle copyBridgeJar --no-daemon --rerun-tasks
          popd

      - name: Stop Gradle daemons
        run: gradle --stop || true

      - name: Prepare bundled JDK and JDTLS resources
        run: |
          set -euo pipefail
          echo "[resources] Preparing bundled JDK and JDTLS resources..."

          mkdir -p .cache/temurin .cache/jdtls

          temurin_archive=".cache/temurin/temurin-linux-x64.tar.gz"
          if [[ ! -f "$temurin_archive" ]]; then
            echo "[resources] Temurin archive cache miss; downloading from URL."
            curl -fL "$TEMURIN_LINUX_X64_TAR_GZ_URL" -o "$temurin_archive"
          else
            echo "[resources] Temurin archive cache hit: $temurin_archive"
          fi
          temurin_hash="$(sha256sum "$temurin_archive" | awk '{print tolower($1)}')"
          temurin_sha_lc="$(printf '%s' "$TEMURIN_LINUX_X64_SHA256" | tr '[:upper:]' '[:lower:]')"
          if [[ "$temurin_hash" != "$temurin_sha_lc" ]]; then
            echo "Temurin SHA256 mismatch: expected $TEMURIN_LINUX_X64_SHA256, got $temurin_hash" >&2
            exit 1
          fi
          echo "[resources] Temurin SHA256 verified."

          jdtls_archive=".cache/jdtls/jdtls.tar.gz"
          if [[ ! -f "$jdtls_archive" ]]; then
            echo "[resources] JDTLS archive cache miss; downloading from URL."
            curl -fL "$JDTLS_DIST_URL" -o "$jdtls_archive"
          else
            echo "[resources] JDTLS archive cache hit: $jdtls_archive"
          fi
          jdtls_hash="$(sha256sum "$jdtls_archive" | awk '{print tolower($1)}')"
          jdtls_sha_lc="$(printf '%s' "$JDTLS_DIST_SHA256" | tr '[:upper:]' '[:lower:]')"
          if [[ "$jdtls_hash" != "$jdtls_sha_lc" ]]; then
            echo "JDTLS SHA256 mismatch: expected $JDTLS_DIST_SHA256, got $jdtls_hash" >&2
            exit 1
          fi
          echo "[resources] JDTLS SHA256 verified."

          jdk_target="resources/jdk/linux-x64"
          echo "[resources] Extracting JDK into $jdk_target"
          rm -rf "$jdk_target"
          mkdir -p "$jdk_target"
          jdk_extract=".cache/temurin/extracted-x64"
          rm -rf "$jdk_extract"
          mkdir -p "$jdk_extract"
          tar -xzf "$temurin_archive" -C "$jdk_extract"
          jdk_root="$(find "$jdk_extract" -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          if [[ -z "$jdk_root" ]]; then
            echo "Could not find extracted JDK directory" >&2
            exit 1
          fi
          cp -a "$jdk_root"/. "$jdk_target"/
          if [[ ! -x "$jdk_target/bin/java" || ! -x "$jdk_target/bin/javac" ]]; then
            echo "Extracted Linux JDK is missing bin/java or bin/javac in $jdk_target" >&2
            exit 1
          fi
          echo "[resources] JDK extracted successfully."

          jdtls_target="resources/jdtls"
          echo "[resources] Extracting JDTLS into $jdtls_target"
          rm -rf "$jdtls_target"
          mkdir -p "$jdtls_target"
          tar -xzf "$jdtls_archive" -C "$jdtls_target"
          echo "[resources] JDTLS extracted successfully."

          for required_dir in plugins features config_linux; do
            if [[ ! -d "$jdtls_target/$required_dir" ]]; then
              echo "JDTLS archive missing expected directory: $required_dir" >&2
              exit 1
            fi
            echo "[resources] Verified JDTLS directory: $required_dir"
          done
          echo "[resources] Resource preparation complete."

      - name: Clean cached bundle intermediates
        run: rm -rf "src-tauri/target/release/bundle"

      - name: Build Tauri Debian bundle
        id: tauri_deb_build
        env:
          RUST_LOG: tauri_bundler=trace
          RUST_BACKTRACE: "1"
          ARCH: x86_64
        run: npx tauri build --ci --bundles deb --config src-tauri/tauri.linux-deb.conf.json

      - name: Prepare release assets
        id: release_assets
        run: |
          set -euo pipefail

          deb_file="$(find "src-tauri/target/release/bundle/deb" -type f -name '*.deb' | head -n 1)"
          if [[ -z "$deb_file" ]]; then
            echo "Debian bundle not found." >&2
            exit 1
          fi

          version="$(awk -F '"' '/^[[:space:]]*version[[:space:]]*=/{print $2; exit}' src-tauri/Cargo.toml | tr -d '\r')"
          if [[ -z "$version" ]]; then
            echo "Could not resolve app version from src-tauri/Cargo.toml" >&2
            exit 1
          fi
          package_name="$(dpkg-deb -f "$deb_file" Package)"
          if [[ -z "$package_name" ]]; then
            echo "Could not resolve Debian package name from $deb_file" >&2
            exit 1
          fi
          release_asset_dir="release-assets"
          mkdir -p "$release_asset_dir"

          deb_release_name="UnimozerNext_${version}_amd64.deb"
          cp "$deb_file" "$release_asset_dir/$deb_release_name"
          echo "Prepared Debian package: $package_name $version"
          echo "deb_path=$release_asset_dir/$deb_release_name" >> "$GITHUB_OUTPUT"
          echo "deb_name=$deb_release_name" >> "$GITHUB_OUTPUT"
          echo "package_name=$package_name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Resolve release metadata
        id: release_meta
        run: |
          set -euo pipefail
          event_name="${{ github.event_name }}"
          publish_input="${{ github.event.inputs.publish_release }}"
          channel="${{ github.event.inputs.release_channel }}"
          release_tag="${{ github.event.inputs.release_tag }}"
          publish_release="false"
          tag_name=""
          is_prerelease="false"

          if [[ "$event_name" == "push" ]]; then
            if [[ "${{ github.ref }}" == refs/tags/* && "${{ vars.PUBLISH_GH_RELEASE }}" == "true" ]]; then
              publish_release="true"
              tag_name="${{ github.ref_name }}"
            elif [[ "${{ github.ref }}" == "refs/heads/prerelease" ]]; then
              publish_release="true"
              tag_name="updater-prerelease"
              is_prerelease="true"
            fi
          elif [[ "$event_name" == "workflow_dispatch" && "$publish_input" == "true" ]]; then
            if [[ "$channel" == "prerelease" ]]; then
              publish_release="true"
              tag_name="updater-prerelease"
              is_prerelease="true"
            elif [[ -n "$release_tag" ]]; then
              publish_release="true"
              tag_name="$release_tag"
            fi
          fi

          echo "publish_release=$publish_release" >> "$GITHUB_OUTPUT"
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"

      - name: Upload Linux Debian bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64-deb
          path: |
            release-assets/UnimozerNext_*_amd64.deb
          if-no-files-found: error

      - name: Publish GitHub release
        if: ${{ steps.release_meta.outputs.publish_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          prerelease: ${{ steps.release_meta.outputs.is_prerelease == 'true' }}
          make_latest: ${{ steps.release_meta.outputs.is_prerelease != 'true' }}
          files: |
            release-assets/UnimozerNext_*_amd64.deb

      - name: Detect GitHub Pages branch
        id: apt_pages
        if: ${{ steps.release_meta.outputs.publish_release == 'true' && steps.release_meta.outputs.is_prerelease != 'true' && steps.release_meta.outputs.tag_name != '' }}
        run: |
          set -u
          set +e
          git ls-remote --exit-code origin gh-pages >/dev/null 2>&1
          status=$?
          set -e
          if [[ "$status" -eq 0 ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          elif [[ "$status" -eq 2 ]]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
          else
            echo "Failed to check whether gh-pages exists; git ls-remote exited with $status" >&2
            exit "$status"
          fi

      - name: Checkout GitHub Pages branch
        if: ${{ steps.apt_pages.outputs.exists == 'true' }}
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: apt-pages

      - name: Initialize GitHub Pages branch
        if: ${{ steps.apt_pages.outputs.exists == 'false' }}
        run: |
          set -euo pipefail
          mkdir -p apt-pages
          cd apt-pages
          git init
          git checkout --orphan gh-pages
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

      - name: Publish APT repository
        if: ${{ steps.release_meta.outputs.publish_release == 'true' && steps.release_meta.outputs.is_prerelease != 'true' && steps.release_meta.outputs.tag_name != '' }}
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
          DEB_PATH: ${{ steps.release_assets.outputs.deb_path }}
          DEB_NAME: ${{ steps.release_assets.outputs.deb_name }}
          PACKAGE_NAME: ${{ steps.release_assets.outputs.package_name }}
          PACKAGE_VERSION: ${{ steps.release_assets.outputs.version }}
        run: |
          set -euo pipefail

          if [[ -z "${APT_GPG_PRIVATE_KEY:-}" ]]; then
            echo "Missing required secret: APT_GPG_PRIVATE_KEY" >&2
            exit 1
          fi
          if [[ -z "${DEB_PATH:-}" || ! -f "$DEB_PATH" ]]; then
            echo "Prepared Debian package not found: ${DEB_PATH:-}" >&2
            exit 1
          fi

          cd apt-pages
          if [[ "$(git branch --show-current)" != "gh-pages" ]]; then
            git checkout -B gh-pages
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          pool_dir="apt/pool/main/u/unimozer-next"
          binary_dir="apt/dists/stable/main/binary-amd64"
          release_dir="apt/dists/stable"
          mkdir -p "$pool_dir" "$binary_dir" "$release_dir"

          cp "../$DEB_PATH" "$pool_dir/$DEB_NAME"

          python3 - "$pool_dir" <<'PY'
          from functools import cmp_to_key
          import os
          import subprocess
          import sys

          pool_dir = sys.argv[1]
          packages = []
          for name in os.listdir(pool_dir):
              if not name.endswith("_amd64.deb"):
                  continue
              path = os.path.join(pool_dir, name)
              try:
                  version = subprocess.check_output(
                      ["dpkg-deb", "-f", path, "Version"],
                      text=True,
                      stderr=subprocess.DEVNULL,
                  ).strip()
              except subprocess.CalledProcessError:
                  continue
              packages.append((version, name, path))

          def compare_packages(left, right):
              left_version, left_name, _ = left
              right_version, right_name, _ = right
              if subprocess.run(
                  ["dpkg", "--compare-versions", left_version, "lt", right_version],
                  check=False,
              ).returncode == 0:
                  return -1
              if subprocess.run(
                  ["dpkg", "--compare-versions", left_version, "gt", right_version],
                  check=False,
              ).returncode == 0:
                  return 1
              return (left_name > right_name) - (left_name < right_name)

          packages.sort(key=cmp_to_key(compare_packages), reverse=True)

          for _, name, path in packages[10:]:
              print(f"Pruning old APT package: {name}")
              os.remove(path)
          PY

          (
            cd apt
            apt-ftparchive packages "pool" > "dists/stable/main/binary-amd64/Packages"
            gzip -9 -c "dists/stable/main/binary-amd64/Packages" > "dists/stable/main/binary-amd64/Packages.gz"
            rm -f "dists/stable/Release" "dists/stable/InRelease" "dists/stable/Release.gpg"

            cat > apt-ftparchive-release.conf <<'EOF'
          APT::FTPArchive::Release {
            Origin "UnimozerNext";
            Label "UnimozerNext";
            Suite "stable";
            Codename "stable";
            Architectures "amd64";
            Components "main";
            Description "Unimozer Next APT Repository";
          };
          EOF

            apt-ftparchive -c apt-ftparchive-release.conf release "dists/stable" > "dists/stable/Release"
            rm -f apt-ftparchive-release.conf
          )

          gpg_home="$(mktemp -d)"
          chmod 700 "$gpg_home"
          export GNUPGHOME="$gpg_home"
          printf '%s\n' "$APT_GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --batch --yes --armor --export > apt/unimozer-next.gpg

          if [[ -n "${APT_GPG_PASSPHRASE:-}" ]]; then
            gpg --batch --yes --pinentry-mode loopback --passphrase "$APT_GPG_PASSPHRASE" \
              --clearsign -o "$release_dir/InRelease" "$release_dir/Release"
            gpg --batch --yes --pinentry-mode loopback --passphrase "$APT_GPG_PASSPHRASE" \
              -abs -o "$release_dir/Release.gpg" "$release_dir/Release"
          else
            gpg --batch --yes --clearsign -o "$release_dir/InRelease" "$release_dir/Release"
            gpg --batch --yes -abs -o "$release_dir/Release.gpg" "$release_dir/Release"
          fi

          rm -rf "$gpg_home"
          unset GNUPGHOME

          echo "APT repository package: $PACKAGE_NAME $PACKAGE_VERSION"
          git add apt
          if git diff --cached --quiet; then
            echo "APT repository is already up to date."
            exit 0
          fi

          git commit -m "Update APT repository for $PACKAGE_VERSION"
          git push origin gh-pages

      - name: Prune stale prerelease Linux assets
        if: ${{ steps.release_meta.outputs.publish_release == 'true' && steps.release_meta.outputs.tag_name == 'updater-prerelease' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("node:fs");
            const cargo = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
            const versionMatch = cargo.match(/^version\s*=\s*"([^"]+)"/m);
            if (!versionMatch) {
              core.setFailed("Could not read version from src-tauri/Cargo.toml");
              return;
            }
            const version = versionMatch[1];
            const keep = new Set([
              `UnimozerNext_${version}_amd64.deb`
            ]);

            const stalePattern = /^(UnimozerNext_.*_(amd64\.deb|x86_64\.AppImage|x86_64\.AppImage\.sig)|latest-linux-x86_64\.json)$/;

            const { owner, repo } = context.repo;
            const release = await github.rest.repos.getReleaseByTag({
              owner,
              repo,
              tag: "updater-prerelease"
            });
            const assets = await github.paginate(github.rest.repos.listReleaseAssets, {
              owner,
              repo,
              release_id: release.data.id,
              per_page: 100
            });

            for (const asset of assets) {
              if (!stalePattern.test(asset.name)) continue;
              if (keep.has(asset.name)) continue;
              core.info(`Deleting stale Linux prerelease asset: ${asset.name}`);
              await github.rest.repos.deleteReleaseAsset({
                owner,
                repo,
                asset_id: asset.id
              });
            }
